name: CI

# Runs on PRs only. Direct pushes to main happen via merge of a CI-passing PR
# (branch protection enforces this), so re-running on push:[main] would just
# burn minutes on the same code. The actual release is gated by publish.yml,
# not by this workflow.

on:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Node 18 dropped 2026-04-25: @elastic/elasticsearch@9 → @elastic/transport@9
        # → undici@7 requires Node 20+ globals (File). Node 18 went EOL 2025-04-30.
        node-version: ['20.x', '22.x']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # product_qa's docs corpus lives in the separate (private) log-10x/mksite
      # repo and is never vendored here. Stage it so the build is representative
      # of what publish.yml ships — see that workflow for the rationale.
      - name: Generate GitHub App token (read-only org CI app)
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.LOG10X_CI_READONLY_APP_ID }}
          private-key: ${{ secrets.LOG10X_CI_READONLY_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout mksite (product_qa docs corpus)
        uses: actions/checkout@v4
        with:
          repository: log-10x/mksite
          token: ${{ steps.app-token.outputs.token }}
          path: mksite-src
          fetch-depth: 1

      - name: Stage latest mksite docs into the build source
        run: |
          set -euo pipefail
          rm -rf config/mksite/docs
          mkdir -p config/mksite/docs
          cp -R mksite-src/docs/. config/mksite/docs/
          find config/mksite/docs -type f ! -name '*.md' -delete
          find config/mksite/docs -type d -empty -delete
          echo "Staged $(find config/mksite/docs -name '*.md' | wc -l) docs from mksite@$(git -C mksite-src rev-parse --short HEAD)"

      - name: Build
        run: npm run build
        env:
          LOG10X_PRODUCT_KB_SRC: ${{ github.workspace }}/config/mksite/docs

      - name: Verify docs corpus is non-empty
        run: |
          set -euo pipefail
          count=$(find build/product-kb/docs -name '*.md' 2>/dev/null | wc -l | tr -d ' ')
          echo "build/product-kb/docs contains $count markdown files"
          if [ "$count" -lt 1 ]; then
            echo "::error::Docs corpus is empty — mksite checkout/staging failed."
            exit 1
          fi

      - name: Unit tests
        run: npm test
        env:
          # Integration tests are gated behind LOG10X_INTEGRATION_TESTS=1.
          # CI runs unit tests only — integration tests skip cleanly.
          LOG10X_INTEGRATION_TESTS: '0'

      - name: Boot smoke (server starts and exits cleanly)
        run: |
          timeout 3 node build/index.js < /dev/null || code=$?
          if [ "${code:-0}" != "0" ] && [ "${code:-0}" != "124" ]; then
            echo "Server exited with unexpected code $code"
            exit 1
          fi
        env:
          LOG10X_API_KEY: 'ci-test-key'

  # Block any merge that doesn't bump package.json — the auto-publish in
  # publish.yml refuses to re-publish a version that's already on npm, so
  # without a bump the merge would land but never ship. Catch it here so the
  # PR author fixes it before merge instead of after.
  version-bump-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify version bumped vs base branch
        run: |
          set -euo pipefail
          git fetch origin "${{ github.base_ref }}" --depth=1
          base_ver=$(git show "origin/${{ github.base_ref }}:package.json" | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version")
          pr_ver=$(node -p "require('./package.json').version")
          echo "base (${{ github.base_ref }}) version: $base_ver"
          echo "PR version: $pr_ver"
          if [ "$base_ver" = "$pr_ver" ]; then
            echo "::error file=package.json::Version unchanged ($pr_ver). Bump package.json before merging — npm refuses to re-publish the same version."
            exit 1
          fi
