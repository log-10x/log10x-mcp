name: Publish to npm

# Auto-publishes on every merge to main where `package.json.version` differs
# from the most recently shipped version (detected by the absence of a
# `v<version>` git tag). PR validation in ci.yml refuses to merge a PR that
# doesn't bump the version, so any push that lands here represents an
# intentional release.
#
# Tag is created AFTER a successful publish so the tag always points at code
# that actually shipped to npm. A failed publish leaves no tag, which is the
# correct invariant — the next merge can retry without manual cleanup.
#
# Auth model: npm Trusted Publishing (OIDC). The package's Trusted Publisher
# config on npmjs.com lists this exact workflow filename (`publish.yml`).
# Configure once at https://www.npmjs.com/package/log10x-mcp/access.
# `--provenance` attaches a Sigstore attestation tying the published tarball
# to this workflow run, verifiable via `npm audit signatures`.
#
# Manual `workflow_dispatch` is wired for re-runs after editing this file
# without forcing an empty version-bump merge.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Concurrency guard: rapid-fire merges shouldn't race a publish in flight.
# cancel-in-progress is OFF — we never want to kill an active npm publish.
concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      # `contents: write` is needed to push the v-tag back to origin after
      # a successful publish. The default GITHUB_TOKEN scope is read-only.
      contents: write
      # Required for npm Trusted Publishing — lets the runner mint an OIDC
      # token that npm verifies against its trusted-publisher config.
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so `git rev-parse v<version>` can see all tags.
          fetch-depth: 0

      - name: Detect version + check whether already shipped
        id: ver
        run: |
          set -euo pipefail
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if git rev-parse --verify --quiet "refs/tags/v$version" >/dev/null; then
            echo "already_shipped=true" >> "$GITHUB_OUTPUT"
            echo "v$version already tagged — nothing to publish."
          else
            echo "already_shipped=false" >> "$GITHUB_OUTPUT"
            echo "v$version not yet tagged — will publish."
          fi

      - name: Setup Node 20 with npm registry
        if: steps.ver.outputs.already_shipped == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      # The npm CLI bundled with Node 20.x is 10.8.x — that version sends the
      # NODE_AUTH_TOKEN that setup-node injects (a GitHub token, not an npm
      # one) as the auth bearer on `npm publish`, which npm.org masks as 404.
      # npm 11.5.1+ detects the GitHub OIDC context and ignores the bogus
      # token, falling back to Trusted Publishing. Force-upgrading is the
      # cleanest fix until Node 20.x ships with npm 11.5+ by default.
      - name: Upgrade npm to >= 11.5.1 (Trusted Publishing requires it)
        if: steps.ver.outputs.already_shipped == 'false'
        run: npm install -g npm@latest

      - name: Install dependencies
        if: steps.ver.outputs.already_shipped == 'false'
        run: npm ci

      # product_qa's docs corpus lives in the separate (private) log-10x/mksite
      # repo and is NEVER vendored here — the repo keeps only
      # config/mksite/docs/.gitkeep. Without this, `npm run build` copies an
      # empty corpus and the published package ships zero docs (docs-search
      # returns no hits). Mirrors the hosted-demo image build in
      # backend/.github/workflows/deploy-public-demo-mcp.yml.
      - name: Generate GitHub App token (read-only org CI app)
        id: app-token
        if: steps.ver.outputs.already_shipped == 'false'
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.LOG10X_CI_READONLY_APP_ID }}
          private-key: ${{ secrets.LOG10X_CI_READONLY_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout mksite (product_qa docs corpus)
        if: steps.ver.outputs.already_shipped == 'false'
        uses: actions/checkout@v4
        with:
          repository: log-10x/mksite
          token: ${{ steps.app-token.outputs.token }}
          path: mksite-src
          fetch-depth: 1

      - name: Stage latest mksite docs into the build source
        if: steps.ver.outputs.already_shipped == 'false'
        run: |
          set -euo pipefail
          rm -rf config/mksite/docs
          mkdir -p config/mksite/docs
          cp -R mksite-src/docs/. config/mksite/docs/
          # Loader only reads .md — drop images/assets to keep the npm tarball lean.
          find config/mksite/docs -type f ! -name '*.md' -delete
          find config/mksite/docs -type d -empty -delete
          echo "Staged $(find config/mksite/docs -name '*.md' | wc -l) docs from mksite@$(git -C mksite-src rev-parse --short HEAD)"

      - name: Build
        if: steps.ver.outputs.already_shipped == 'false'
        run: npm run build
        env:
          LOG10X_PRODUCT_KB_SRC: ${{ github.workspace }}/config/mksite/docs

      # Fail loudly rather than publishing an empty corpus. This is the guard
      # whose absence let every prior version ship without docs.
      - name: Verify docs corpus is non-empty
        if: steps.ver.outputs.already_shipped == 'false'
        run: |
          set -euo pipefail
          count=$(find build/product-kb/docs -name '*.md' 2>/dev/null | wc -l | tr -d ' ')
          echo "build/product-kb/docs contains $count markdown files"
          if [ "$count" -lt 1 ]; then
            echo "::error::Docs corpus is empty — refusing to publish. mksite checkout/staging failed (check LOG10X_CI_READONLY_APP_* secrets and mksite access)."
            exit 1
          fi

      - name: Test
        if: steps.ver.outputs.already_shipped == 'false'
        run: npm test
        env:
          LOG10X_INTEGRATION_TESTS: '0'

      - name: Publish to npm (Trusted Publishing + provenance)
        if: steps.ver.outputs.already_shipped == 'false'
        run: npm publish --access public --provenance

      - name: Tag v${{ steps.ver.outputs.version }} (post-publish, ship-of-record)
        if: steps.ver.outputs.already_shipped == 'false'
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.ver.outputs.version }}"
          git push origin "v${{ steps.ver.outputs.version }}"
