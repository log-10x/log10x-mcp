name: Eval campaign (score-only)

# Re-scores saved hero transcripts against the latest expected_answer
# state on every PR. This is the falsifiable-proof check from the
# anti-hallucination campaign — see eval/CAMPAIGN.md.
#
# It does NOT spawn sub-agents and does NOT hit Anthropic, so it costs
# zero tokens and runs without LOG10X_API_KEY. A regression here means
# either:
#   - someone moved a hero spec / scorer in a way that breaks already-
#     captured transcripts (test failure)
#   - someone changed the rubric (intentional — bump the saved baselines)
#
# To re-run the full campaign with fresh sub-agents (costs ~$10), do
# it locally:
#   ANTHROPIC_API_KEY=... LOG10X_EVAL_ENV=demo \
#     node eval/bin/run-campaign.mjs

on:
  pull_request:
    branches: [main]
    paths:
      - 'eval/**'
      - 'src/tools/**'
      - 'src/lib/**'
      - 'package.json'

jobs:
  campaign-rescore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install MCP dependencies
        run: npm ci

      - name: Build MCP
        run: npm run build

      - name: Install eval dependencies
        working-directory: eval
        run: npm install

      - name: Build eval harness
        working-directory: eval
        run: npm run build

      - name: Verify gap state is well-formed
        run: |
          set -euo pipefail
          node -e '
            const g = require("./eval/gaps/gaps.json");
            if (!Array.isArray(g)) { console.error("gaps.json is not an array"); process.exit(1); }
            const open = g.filter(x => x.fix_status === "open");
            console.log(`Total gaps: ${g.length}. Open: ${open.length}.`);
            if (open.length > 0) {
              console.error("::warning ::There are open gaps in eval/gaps/gaps.json. Disposition them (fixed / wontfix) before merge.");
              for (const og of open) console.error(`  open: ${og.question_id} (${og.gap_kind}) — ${og.gap_description}`);
            }
            for (const x of g) {
              if (!x.question_id || !x.gap_kind || !x.fix_status) {
                console.error(`Malformed gap: ${JSON.stringify(x)}`); process.exit(1);
              }
              if (!["open","in_progress","fixed","wontfix"].includes(x.fix_status)) {
                console.error(`Bad fix_status on ${x.question_id}: ${x.fix_status}`); process.exit(1);
              }
            }
          '

      - name: Re-score saved hero transcripts
        run: |
          set -euo pipefail
          # --score-only: do not spawn agents. --stale: accept saved transcripts
          # without freshness check. --skip-refresh: do not call oracle (no
          # live env). --min-pass=14: gate on the documented baseline (one
          # scenario, stability-newly-emerged, is documented agent-quality
          # variance and is dispositioned wontfix in eval/gaps/gaps.json).
          # CI fails when fewer than 14/15 PASS — that is a regression.
          LOG10X_EVAL_ENV=demo node eval/bin/run-campaign.mjs \
            --score-only --stale --skip-refresh --min-pass 14

      - name: Spec-anchor lint
        run: |
          set -euo pipefail
          # Every hero spec must have at least one anchor (top_patterns,
          # must_mention, expected_severity_split, refusal_required, etc.)
          # so that an honest-empty answer cannot pass the rubric trivially.
          # Surfaced by the adversarial run on error-critical-events as
          # the honest-empty-no-anchors shape.
          node eval/bin/lint-specs.mjs

      - name: Shape-coverage harness
        run: |
          set -euo pipefail
          # Re-scores every fabrication under eval/shapes/<shape>/fabrications/
          # via the unmodified campaign scorer. --min-coverage gates on the
          # baseline measured at the time the harness landed (3/16 shapes
          # covered by should_fail fabrications correctly being detected).
          # A drop below this = scorer regression with respect to detected
          # failure shapes. Improvements (more shapes covered) keep CI green.
          # Baseline progression:
          #   3/16 (18.8%) → 12/18 (66.7%) after D fixes (paired vol, scope,
          #                    spec lint, must_not_mention defaults + 9 fabs)
          #   12/18 → 15/18 (83.3%) after LLM mini-classifier axes (direction,
          #                    window, narrative_frame, citation) on 2 specs
          # A drop below 0.6 = scorer regression on detected failure shapes.
          # When ANTHROPIC_API_KEY is unset (CI default — no LLM cost on every
          # PR), the classifier axes silently skip and coverage falls back to
          # deterministic-only (12/18). The 0.6 floor accommodates that
          # without ever depending on LLM availability. Setting the key would
          # raise observed coverage to ~0.83 but is not required for the gate.
          LOG10X_EVAL_ENV=demo node eval/bin/run-shapes.mjs --min-coverage 0.6

      - name: Upload re-scored verdicts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: campaign-verdicts
          path: |
            eval/reports/hero/CAMPAIGN-PROOF.md
            eval/reports/hero/SUITE-SUMMARY.md
            eval/reports/hero/*/*/campaign-verdict.json
            eval/shapes/COVERAGE.md
          if-no-files-found: warn
          retention-days: 14
