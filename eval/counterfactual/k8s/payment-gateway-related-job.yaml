## Phase 11 — "related-by-design" plant emitting an upstream
## payment-gateway connection-pool-exhaustion pattern that is
## SEMANTICALLY RELATED to the canary's `checkout retry blast`
## but has NO CAUSAL LINK in the planted environment (both jobs
## run independently). Tests whether agents:
##
##   - Correctly surface the lexical/temporal correlation as
##     "potentially related"
##   - Resist FABRICATING a causal link without evidence
##
## Pair-tested alongside the existing concurrent-noise-job.yaml
## (DNS resolution failures, unrelated-by-design). The 3-signal
## environment is:
##
##   synthetic-canary-app  bug mode    ERROR "checkout retry blast..."
##   payment-gateway-job   ERROR      "payment-gateway: connection pool exhausted..."
##   concurrent-noise-job  ERROR      "DNS resolution failed..."
##
## The pasted alert (from a hero fixture) quotes a single line
## from the canary. Agent must distinguish which of the other two
## signals is plausibly related vs. unrelated noise.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-gateway-script
  namespace: otel-demo
  labels:
    app: payment-gateway-related
data:
  emit.py: |
    #!/usr/bin/env python3
    """
    Payment-gateway connection-pool exhaustion emitter — a
    plausibly-upstream signal to the canary's checkout retry storm.
    Independent process, no real causal link to the canary; relies
    only on temporal + lexical co-occurrence to LOOK related.
    """
    import json, os, sys, time, uuid
    from datetime import datetime, timezone

    DURATION_S = int(os.environ.get("DURATION_SECONDS", "600"))
    RATE_PER_SEC = float(os.environ.get("RATE_PER_SEC", "1.0"))
    SERVICE = "payment-gateway"
    RUN_ID = str(uuid.uuid4())

    TEMPLATE = (
        "payment-gateway: HTTP 503 returned to upstream cart-service; "
        "connection pool exhausted capacity=100/100; "
        "node=payment-gateway-{shard} request_id=req_{idx:08d}"
    )

    start = time.time()
    idx = 0
    interval = 1.0 / RATE_PER_SEC
    while time.time() - start < DURATION_S:
        event = {
            "timestamp": datetime.now(timezone.utc).isoformat(),
            "severity": "ERROR",
            "service": SERVICE,
            "message": TEMPLATE.format(shard=idx % 7, idx=idx),
            "related_plant": "true",
            "run_id": RUN_ID,
            "idx": idx,
        }
        sys.stdout.write(json.dumps(event) + "\n")
        sys.stdout.flush()
        idx += 1
        time.sleep(interval)
---
apiVersion: batch/v1
kind: Job
metadata:
  name: payment-gateway-related-job
  namespace: otel-demo
  labels:
    app: payment-gateway-related
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: payment-gateway-related
    spec:
      restartPolicy: Never
      containers:
        - name: emitter
          image: python:3.11-slim
          imagePullPolicy: IfNotPresent
          command: ["python3", "/scripts/emit.py"]
          env:
            - name: DURATION_SECONDS
              value: "600"
            - name: RATE_PER_SEC
              value: "1.0"
          volumeMounts:
            - name: script
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
      volumes:
        - name: script
          configMap:
            name: payment-gateway-script
            items:
              - key: emit.py
                path: emit.py
                mode: 0755
