## Concurrent-noise k8s Job for the log10x-mcp counterfactual harness,
## specifically the `concurrent-signals` hero scenario.
##
## Plants a SECOND, simultaneous ERROR pattern in the otel-demo
## namespace alongside the synthetic-canary-app Deployment. This Job
## emits a distinct unique pattern ("DNS resolution failed for
## upstream service N: timeout after 5000ms") at a comparable rate.
##
## Critical design point: this Job is deployed DIRECTLY via kubectl,
## NOT via the talwgx/test GitHub Actions workflow. It has NO
## `canary.github.io/*` annotations and NO GitHub-trail metadata. An
## agent doing root-cause attribution should be able to tell that:
##
##   - synthetic-canary-app: deployed from talwgx/test (annotation
##     present, gh api repos/talwgx/test/commits/<sha> resolves)
##   - concurrent-noise-job: NO github-trail, no canary annotation,
##     no resolvable SHA — therefore not the cause of any alert that
##     started after a recent deploy event in talwgx/test
##
## Lifetime: 5 minutes (300s × 1 ev/s = 300 events). Auto-cleans
## via ttlSecondsAfterFinished. Re-apply to re-arm.
##
## Usage:
##   kubectl apply -f concurrent-noise-job.yaml
##   # wait ~60s for propagation
##   # run concurrent-signals hero scenario
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: concurrent-noise-script
  namespace: otel-demo
  labels:
    app: concurrent-noise
data:
  emit.py: |
    #!/usr/bin/env python3
    """
    Unrelated noise emitter — looks like a natural DNS-failure pattern.
    Deliberately has NO github_sha / no canary annotations so an agent
    can verify there is no deploy trail to attribute this signal to.
    """
    import json, os, sys, time, uuid
    from datetime import datetime, timezone

    DURATION_S = int(os.environ.get("NOISE_DURATION_SECONDS", "300"))
    RATE_PER_SEC = float(os.environ.get("NOISE_RATE_PER_SEC", "1.0"))
    SERVICE = os.environ.get("NOISE_SERVICE", "concurrent-noise-emitter")
    RUN_ID = str(uuid.uuid4())

    TEMPLATE = (
        "DNS resolution failed for upstream service {svc}: "
        "timeout after {timeout_ms}ms attempts={attempts} "
        "resolver={resolver} request_id={req_id}"
    )

    start = time.time()
    idx = 0
    interval = 1.0 / RATE_PER_SEC
    while time.time() - start < DURATION_S:
        event = {
            "timestamp": datetime.now(timezone.utc).isoformat(),
            "severity": "ERROR",
            "service": SERVICE,
            "message": TEMPLATE.format(
                svc=f"svc-{idx % 5}",
                timeout_ms=5000 + (idx % 20) * 100,
                attempts=(idx % 3) + 1,
                resolver="kube-dns",
                req_id=f"req_{idx:06d}",
            ),
            "noise_source": "true",
            "run_id": RUN_ID,
            "idx": idx,
        }
        sys.stdout.write(json.dumps(event) + "\n")
        sys.stdout.flush()
        idx += 1
        time.sleep(interval)
---
apiVersion: batch/v1
kind: Job
metadata:
  name: concurrent-noise-job
  namespace: otel-demo
  labels:
    app: concurrent-noise
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: concurrent-noise
    spec:
      restartPolicy: Never
      containers:
        - name: emitter
          image: python:3.11-slim
          imagePullPolicy: IfNotPresent
          command: ["python3", "/scripts/emit.py"]
          env:
            - name: NOISE_DURATION_SECONDS
              value: "300"
            - name: NOISE_RATE_PER_SEC
              value: "1.0"
          volumeMounts:
            - name: script
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
      volumes:
        - name: script
          configMap:
            name: concurrent-noise-script
            items:
              - key: emit.py
                path: emit.py
                mode: 0755
