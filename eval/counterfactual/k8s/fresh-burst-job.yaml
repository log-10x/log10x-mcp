## Short-burst canary k8s Job — designed to exercise the
## `stability-newly-emerged` MCP scenario.
##
## The MCP's newly-emerged probe uses:
##   rate(...[5m]) > 0.001 unless on (pattern) rate(...[5m] offset 1h) > 0
## i.e. a pattern qualifies as "newly emerged" only if its 5-minute
## rate is non-trivial AND its rate 1 hour ago was zero. The continuous
## synthetic-canary Deployment fails this test once it has been running
## for >1h — its 1h-offset rate is non-zero.
##
## This Job emits a DISTINCT message body (and therefore a distinct
## message_pattern hash) that has never appeared in the env before. Job
## lifetime is ~3 minutes; after it completes the pattern's 5m rate
## drops to zero and the newly-emerged classification ages out
## naturally.
##
## Usage:
##   kubectl apply -f fresh-burst-job.yaml
##   # wait ~90s for fluentd → engine → Prometheus
##   # run stability-newly-emerged immediately
##   kubectl delete job fresh-burst-canary -n otel-demo    # optional; Job auto-completes
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fresh-burst-script
  namespace: otel-demo
  labels:
    app: fresh-burst-canary
    synthetic_canary: "true"
data:
  emit.py: |
    #!/usr/bin/env python3
    """
    Short-burst canary: emits a NEW unique-message-template pattern
    that has zero 1h-offset rate (because it never existed before).
    Runs for 3 minutes, then exits. Job completes → 5m rate drops →
    pattern ages out of newly-emerged.
    """
    import json, os, sys, time, uuid
    from datetime import datetime, timezone

    RUN_ID = str(uuid.uuid4())
    DURATION_S = int(os.environ.get("BURST_DURATION_SECONDS", "180"))   # 3 min
    RATE_PER_SEC = float(os.environ.get("BURST_RATE_PER_SEC", "3.0"))   # 540 events total
    SERVICE_NAME = os.environ.get("BURST_SERVICE", "fresh-burst-canary")

    # IMPORTANT: the message template must produce a DISTINCT pattern hash
    # from anything previously seen by the engine. We use a fresh
    # uuid-shaped token and timestamp keyword that the tenx-edge templater
    # will retain as part of the pattern key.
    TEMPLATE = (
        f"FRESH_BURST canary newcomer pattern probe never seen before "
        f"ts={int(time.time())} run={RUN_ID[:8]} idx={{idx}}"
    )

    sys.stdout.write(
        f'{{"level":"INFO","msg":"fresh burst starting","rate":{RATE_PER_SEC},'
        f'"duration_s":{DURATION_S},"service":"{SERVICE_NAME}","run_id":"{RUN_ID}"}}\n'
    )
    sys.stdout.flush()

    start = time.time()
    idx = 0
    interval = 1.0 / RATE_PER_SEC

    while time.time() - start < DURATION_S:
        # Mix severities to test multiple newly-emerged signatures.
        sev = ["INFO", "WARN", "ERROR"][idx % 3]
        msg = TEMPLATE.format(idx=idx)
        event = {
            "timestamp": datetime.now(timezone.utc).isoformat(),
            "severity": sev,
            "service": SERVICE_NAME,
            "message": msg,
            "synthetic_canary": "true",
            "burst_run_id": RUN_ID,
            "idx": idx,
        }
        sys.stdout.write(json.dumps(event) + "\n")
        sys.stdout.flush()
        idx += 1
        time.sleep(interval)

    sys.stdout.write(
        f'{{"level":"INFO","msg":"fresh burst done","emitted":{idx},'
        f'"run_id":"{RUN_ID}"}}\n'
    )
    sys.stdout.flush()
---
apiVersion: batch/v1
kind: Job
metadata:
  name: fresh-burst-canary
  namespace: otel-demo
  labels:
    app: fresh-burst-canary
    synthetic_canary: "true"
spec:
  ttlSecondsAfterFinished: 600   # auto-delete Job 10min after it completes
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: fresh-burst-canary
        synthetic_canary: "true"
    spec:
      restartPolicy: Never
      containers:
        - name: emitter
          image: python:3.11-slim
          imagePullPolicy: IfNotPresent
          command: ["python3", "/scripts/emit.py"]
          env:
            - name: BURST_DURATION_SECONDS
              value: "180"
            - name: BURST_RATE_PER_SEC
              value: "3.0"
            - name: BURST_SERVICE
              value: "fresh-burst-canary"
          volumeMounts:
            - name: script
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
      volumes:
        - name: script
          configMap:
            name: fresh-burst-script
            items:
              - key: emit.py
                path: emit.py
                mode: 0755
