## Parser for the NDJSON events emitted by the Python generator.
## The `timestamp` field is ISO8601; Fluent Bit's `json` parser
## extracts it as a string and the engine accepts that.

[PARSER]
    Name        json
    Format      json
    Time_Key    timestamp
    Time_Format %Y-%m-%dT%H:%M:%S.%L%z
    Time_Keep   On
