## Fluent Bit config for the counterfactual injection harness.
##
## Tails the synthetic events file written by the Python generator,
## parses NDJSON, and forwards to the log10x/edge-10x engine via the
## Unix socket on the shared `tenx-sockets` volume.
##
## Modeled on the canonical Reporter Helm config at
##   ~/git/l1x-co/helm-charts/charts/reporter/templates/configmap.yaml
## but stripped of the kubernetes filter (no k8s API in this stack)
## and pointed at /var/log/synthetic/events.log instead of
## /var/log/containers/*.log.

[SERVICE]
    Daemon       Off
    Flush        1
    Log_Level    info
    Parsers_File parsers.conf
    HTTP_Server  On
    HTTP_Listen  0.0.0.0
    HTTP_Port    2020
    Health_Check On

[INPUT]
    Name             tail
    Path             /var/log/synthetic/events.log
    Tag              synthetic.*
    Parser           json
    Refresh_Interval 1
    Read_from_Head   true
    DB               /var/log/synthetic/.fluent-bit-tail.db
    Mem_Buf_Limit    5MB
    Skip_Long_Lines  On

## Tag every record so the engine treats it as a synthetic-canary log.
## The engine's @apps/reporter aggregates per-(message_pattern,
## severity_level, tenx_user_service); these fields must be present
## in the record. We rename `service` → `tenx_user_service` so the
## downstream Prometheus label matches the canonical name (per
## log10x-mcp/src/lib/promql.ts LABELS.service).

[FILTER]
    Name      modify
    Match     synthetic.*
    Rename    service tenx_user_service
    Rename    severity severity_level
    Set       tenx_env edge

[OUTPUT]
    Name              forward
    Match             synthetic.*
    Unix_path         /tenx-sockets/tenx-reporter.sock
    Workers           1
    Retry_Limit       5
    net.keepalive     off
    net.connect_timeout 10
