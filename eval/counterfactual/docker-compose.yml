## Counterfactual injection harness — local 3-service stack.
##
## Brings up the 10x engine (`log10x/edge-10x`, runs `@apps/reporter`,
## remote-writes to the target env's Prometheus tenant), a Fluent Bit
## forwarder (tails the synthetic events file → forwards to engine via
## Unix socket), and a build-only generator service (spawned per-spec by
## the orchestrator).
##
## Env vars required:
##   TENX_API_KEY   the API key for the target env
##   TENX_ENV_ID    the envId (informational only — the engine picks up
##                  the user's default env from the API key)
##
## Phase 1 target: talw.gx env (envId 8209858b-...).
## Phase 2 target: OTel demo env; same compose, different env vars.

services:
  pipeline-10x:
    # Engine + bundled Reporter app. Canonical image per the Helm chart
    # at ~/git/l1x-co/helm-charts/charts/reporter/values.yaml. Pinned to
    # the chart's appVersion (1.0.19) to match the demo env's deployed
    # engine.
    image: log10x/edge-10x:1.0.19
    container_name: counterfactual-pipeline-10x
    # Override the image's `runAsUser: 10001` (Helm chart hardening)
    # so the engine can bind the Unix socket in the named volume,
    # which mounts root:root by default. The production deployment
    # uses a k8s securityContext + fsGroup; for the local docker
    # stack root is the simplest path.
    user: "0:0"
    environment:
      TENX_API_KEY: ${TENX_API_KEY:?TENX_API_KEY must be set (the target env API key)}
      TENX_FORWARD_INPUT_ADDRESS: /tenx-sockets/tenx-reporter.sock
    # @apps/edge/optimizer is what the OTel demo env actually runs
    # (per backend/terraform/demo/values/tenx-optimizer-demo.yaml).
    # It emits `all_events_*` metrics — the family MCP tools query.
    # @apps/reporter (which emits `emitted_events_*` instead) is the
    # alternative; switch back if you want raw edge metrics.
    command: ["run", "@apps/edge/optimizer"]
    volumes:
      - tenx-sockets:/tenx-sockets
    restart: unless-stopped

  ## The generator is spawned per-spec (`docker compose run --rm generator
  ## --spec /specs/<id>.json`) by the orchestrator and exits when its
  ## duration elapses.
  ##
  ## Default mode: `forward` — generator speaks the Fluentd Forward
  ## Protocol DIRECTLY to the engine's unix socket. No Fluent Bit in
  ## between. This sidestepped a wire-format incompatibility between
  ## fluent-bit 4.2.4's forward output and the engine v1.0.18's
  ## ForwardProtocolInputStream decoder (engine kept reporting "socket
  ## idle, no decoded messages" even though fluent-bit was pushing
  ## bytes). The generator's Python `msgpack` library produces a
  ## known-good `[tag, time, record]` frame the engine accepts.
  generator:
    build:
      context: ./generator
    image: counterfactual-generator:latest
    volumes:
      - tenx-sockets:/tenx-sockets
      - ./specs:/specs:ro
    profiles: ["generator"]   # only started when explicitly invoked
    depends_on:
      - pipeline-10x

volumes:
  tenx-sockets:
