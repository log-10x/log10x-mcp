# tenx_hash forwarder-native drop + egress via a Fluent Bit sidecar.
# The Ruby fluent-plugin-cloudwatch-logs silently never flushed in
# this pod/firehose topology. Four fluentd-side fixes failed with the
# identical signature: the buffer fills, the chunk leaves disk,
# CloudWatch stays starved, and the plugin emits zero log lines even
# at @log_level info. Egress is moved off the Ruby plugin to a Fluent
# Bit sidecar (Go cloudwatch_logs, a separate codebase) reached via
# forward on 127.0.0.1:24226.
<label @OUTPUT>
  <filter **>
    @type grep
    <exclude>
      key tenx_hash
      pattern /^oiE13WLiimU$/
    </exclude>
  </filter>
  <match **>
    @type forward
    @id out_to_fluentbit_cwl
    require_ack_response false
    <server>
      host 127.0.0.1
      port 24226
    </server>
    <buffer>
      @type file
      path /tmp/fluentd-fbfwd-buffer
      flush_interval 3s
      flush_thread_count 2
      retry_type exponential_backoff
      retry_wait 1s
      retry_max_interval 15s
      retry_forever true
      total_limit_size 256m
      overflow_action block
    </buffer>
  </match>
</label>
