[SERVICE]
    Flush         5
    Log_Level     info
    Daemon        off
    HTTP_Server   On
    HTTP_Listen   127.0.0.1
    HTTP_Port     2020

[INPUT]
    Name    forward
    Listen  127.0.0.1
    Port    24226

[OUTPUT]
    Name               cloudwatch_logs
    Match              *
    region             us-east-1
    log_group_name     /log10x/otel-demo/enriched
    log_stream_name    tenx-fluentd
    auto_create_group  true
