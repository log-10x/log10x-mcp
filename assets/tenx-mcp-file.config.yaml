# Log10x MCP — file-mode tenx runtime config.
#
# Reads events from LOG10X_MCP_INPUT_PATH, writes templates/encoded/
# decoded/aggregated to LOG10X_MCP_OUTPUT_DIR. Override this file via
# LOG10X_MCP_FILE_CONFIG_PATH.

tenx: run
runtimeName: $=TenXEnv.get("LOG10X_MCP_RUNTIME_NAME", "mcp-file")

# Include the input/output MODULES, not their config wrappers. The
# wrappers pre-define named entries reading/writing the image's bundled
# sample, and `allowMultiple: true` would run those alongside the MCP's
# own entries below.
include:


  # Shared bootstrap (symbols, template loading, transform, etc.)
  - apps/shared

  # Input module
  - run/modules/input/file

  # Full enrichment chain.
  - run/initialize/inputField
  - run/initialize/level
  - run/initialize/group
  - run/initialize/message
  - run/initialize/httpCode
  - run/initialize/lookup
  - run/initialize/custom
  - run/initialize/k8s

  # Output module
  - run/modules/output/event/file

# Template cache: in local-binary mode the runner shadows the install's
# run/template/config.yaml with files: [] so persistent state under
# data/templates/ and data/sample/output/ doesn't pre-load. Docker is
# ephemeral, so the runner skips the shadow there.

# ========================== Input options ==========================

inputFile:
  - name: mcpFileInput
    path: $=TenXEnv.get("LOG10X_MCP_INPUT_PATH")
    printProgress: false
    extractors: []
    sourcePattern: null

# ========================= Output options =========================

outputFile:

  - path: $=TenXEnv.get("LOG10X_MCP_OUTPUT_DIR") + "/templates.json"
    writeTemplates: true
    append: false

  - path: $=TenXEnv.get("LOG10X_MCP_OUTPUT_DIR") + "/encoded.log"
    fields:
      - encode()

  - path: $=TenXEnv.get("LOG10X_MCP_OUTPUT_DIR") + "/decoded.log"
    filter: isEncoded
    fields:
      - text

  - path: $=TenXEnv.get("LOG10X_MCP_OUTPUT_DIR") + "/aggregated.csv"
    filter: isSummary
    header: $=yield TenXString.join(",", TenXEnv.get("enrichmentFields"), "summaryVolume", "summaryBytes", "summaryTotals") + "\n"
    fields:
      - $=yield TenXEnv.get("enrichmentFields")
      - summaryVolume
      - summaryBytes
      - summaryTotals
